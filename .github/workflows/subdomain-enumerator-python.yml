name: Python Subdomain Enumerator

on:
  schedule:
    # Run daily at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Target domain'
        required: true
        default: 'example.com'
      wordlist:
        description: 'Custom wordlist URL (optional)'
        required: false
        default: ''
      threads:
        description: 'Number of threads'
        required: false
        default: '50'
      securitytrails_key:
        description: 'SecurityTrails API key (optional)'
        required: false
      virustotal_key:
        description: 'VirusTotal API key (optional)'
        required: false

jobs:
  enumerate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dnspython requests
    
    - name: Create wordlist (if URL provided)
      if: github.event.inputs.wordlist != ''
      run: |
        curl -L "${{ github.event.inputs.wordlist }}" -o custom_wordlist.txt
    
    - name: Run subdomain enumeration
      env:
        ST_API_KEY: ${{ secrets.SECURITYTRAILS_API_KEY || github.event.inputs.securitytrails_key }}
        VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY || github.event.inputs.virustotal_key }}
      run: |
        if [ -f "subdomain_enum.py" ]; then
          python subdomain_enum.py \
            -d "${{ github.event.inputs.domain }}" \
            ${CUSTOM_WORDLIST:+-w custom_wordlist.txt} \
            -t "${{ github.event.inputs.threads }}" \
            ${ST_API_KEY:+--st-api $ST_API_KEY} \
            ${VT_API_KEY:+--vt-api $VT_API_KEY} \
            | tee results.txt
        else
          echo "Error: subdomain_enum.py not found"
          exit 1
        fi
    
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: python-subdomain-results
        path: results.txt
        retention-days: 7
    
    - name: Create GitHub issue on new findings (optional)
      if: always()
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          try {
            const results = fs.readFileSync('results.txt', 'utf8');
            const subdomains = results.match(/- .*\.${{ github.event.inputs.domain }}/g) || [];
            
            if (subdomains.length > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Subdomain Enumeration Results for ${{ github.event.inputs.domain }}`,
                body: `Found ${subdomains.length} subdomains:\n\`\`\`\n${subdomains.join('\n')}\n\`\`\``,
                labels: ['security', 'subdomain-enumeration']
              });
            }
          } catch(e) {
            console.log('No results file found or error creating issue');
          }
