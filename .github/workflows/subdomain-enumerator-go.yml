name: Go Subdomain Enumerator

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Target domain'
        required: true
        default: 'example.com'
      wordlist:
        description: 'Custom wordlist URL (optional)'
        required: false
        default: ''
      threads:
        description: 'Number of threads'
        required: false
        default: '50'
      securitytrails_key:
        description: 'SecurityTrails API key (optional)'
        required: false
      virustotal_key:
        description: 'VirusTotal API key (optional)'
        required: false

jobs:
  enumerate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Install dependencies
      run: |
        go mod init subdomain-enum || true
        go get github.com/miekg/dns
    
    - name: Create wordlist file
      if: github.event.inputs.wordlist != ''
      run: |
        curl -L "${{ github.event.inputs.wordlist }}" -o custom_wordlist.txt
    
    - name: Build Go binary
      run: |
        go build -o subdomain-enum subdomain_enum.go
    
    - name: Run subdomain enumeration
      env:
        ST_API_KEY: ${{ secrets.SECURITYTRAILS_API_KEY || github.event.inputs.securitytrails_key }}
        VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY || github.event.inputs.virustotal_key }}
      run: |
        ./subdomain-enum \
          -d "${{ github.event.inputs.domain }}" \
          ${CUSTOM_WORDLIST:+-w custom_wordlist.txt} \
          -t "${{ github.event.inputs.threads }}" \
          ${ST_API_KEY:+--st-api $ST_API_KEY} \
          ${VT_API_KEY:+--vt-api $VT_API_KEY} \
          2>&1 | tee results.txt
    
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: go-subdomain-results
        path: results.txt
        retention-days: 7
    
    - name: Send notification to Slack (optional)
      if: always() && secrets.SLACK_WEBHOOK_URL != ''
      uses: act10ns/slack@v1
      with:
        status: ${{ job.status }}
        channel: '#security-alerts'
        message: "Subdomain enumeration completed for ${{ github.event.inputs.domain }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
